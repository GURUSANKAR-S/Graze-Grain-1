version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: grazeandgrain
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: grazeandgrain
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

volumes:
  postgres_data:
